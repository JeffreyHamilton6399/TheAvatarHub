<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Family Trees · AvatarArchive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Cinzel+Decorative:wght@400;700;900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,.35);
  --bg: #04070d;
  --bg2: rgba(8,14,26,.95);
  --muted: #6b8aab;
  --white: #e8ecf0;
  --fire: #f97316;
  --water: #4db8ff;
  --earth: #6abf69;
  --air: #f5c518;
  --spirit: #9b7fe8;
  --none: #6b8aab;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--white);font-family:'Philosopher',serif;overflow:hidden;}

/* ── Background ── */
.bg-layer{
  position:fixed;inset:0;
  background-image:url('images/mainbg.png');
  background-size:cover;background-position:center top;
  filter:blur(8px) brightness(0.15) saturate(1.2);
  transform:scale(1.04);z-index:0;pointer-events:none;
}
.bg-layer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(4,7,13,.65) 0%,transparent 30%,transparent 70%,rgba(4,7,13,.8) 100%);
}

/* ── Canvas ── */
#canvasOuter{position:fixed;inset:0;overflow:hidden;cursor:grab;touch-action:none;z-index:1;}
#canvasOuter.drag{cursor:grabbing;}
#canvasInner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;}
#bridgeSvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:2;}

/* ── Header ── */
.header{position:fixed;top:0;left:0;right:0;z-index:50;padding:.6rem 1.4rem .4rem;
  background:linear-gradient(to bottom,rgba(4,7,13,.98) 60%,transparent);
  display:flex;align-items:center;justify-content:space-between;pointer-events:none;}
.header-title{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:1.1rem;
  background:linear-gradient(135deg,#f0dfa0,#c9a84c 50%,#8a6a1a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-sub{font-family:'Cinzel',serif;font-size:.3rem;letter-spacing:.35em;
  text-transform:uppercase;color:rgba(201,168,76,.45);margin-top:.1rem;}

/* ── Legend ── */
.legend{position:fixed;bottom:14px;left:14px;z-index:50;display:flex;flex-wrap:wrap;gap:.3rem .6rem;max-width:300px;}
.leg{display:inline-flex;align-items:center;gap:.28rem;font-family:'Cinzel',serif;font-size:.26rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.leg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── HUD ── */
.hud{position:fixed;bottom:14px;right:14px;z-index:50;display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.zbtn{width:32px;height:32px;border-radius:50%;background:rgba(6,10,20,.85);border:1px solid rgba(201,168,76,.2);
  color:rgba(201,168,76,.8);font-size:1rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;transition:background .15s;}
.zbtn:hover{background:rgba(201,168,76,.12);}
.zreset{font-family:'Cinzel',serif;font-size:.28rem;letter-spacing:.1em;text-transform:uppercase;
  padding:.35em .8em;border-radius:20px;background:rgba(6,10,20,.8);border:1px solid rgba(201,168,76,.15);
  color:rgba(201,168,76,.5);cursor:pointer;pointer-events:all;transition:all .15s;}
.zreset:hover{color:rgba(201,168,76,.9);}

/* ── Tree block ── */
.tree-wrap{position:absolute;display:inline-flex;flex-direction:column;align-items:center;}
.tree-title{font-family:'Cinzel',serif;font-size:.3rem;letter-spacing:.28em;text-transform:uppercase;
  margin-bottom:4px;white-space:nowrap;}

/* ── Family tree nodes ── */
.ftree{display:flex;flex-direction:column;align-items:center;position:relative;}
.fn{display:flex;flex-direction:column;align-items:center;}
.couple{display:flex;align-items:flex-start;gap:2px;}
.mx{font-family:'Cinzel',serif;font-size:.5rem;color:var(--muted);padding:0 2px;opacity:.5;margin-top:12px;}
.drop{width:1px;height:8px;background:var(--tc,var(--gold-dim));}
.cr{display:flex;align-items:flex-start;}
.cb{display:flex;flex-direction:column;align-items:center;padding:0 3px;position:relative;}
.cb::before{content:'';display:block;width:1px;height:8px;background:var(--tc,var(--gold-dim));}
.cb::after{content:'';position:absolute;top:0;height:1px;background:var(--tc,var(--gold-dim));left:0;right:0;}
.cb:first-child::after{left:50%;}
.cb:last-child::after{right:50%;}
.cb:only-child::after{display:none;}

/* ── Person card ── */
.pn{width:96px;border-radius:8px;padding:5px 7px 6px;background:rgba(10,17,28,.9);
  border:1px solid rgba(255,255,255,.07);cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .18s,box-shadow .18s,opacity .12s;text-align:left;user-select:none;}
.pn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--ec,var(--gold));}
.pn:hover{border-color:rgba(var(--er,201,168,76),.4);box-shadow:0 0 14px rgba(var(--er,201,168,76),.14);}
.pn.sp{opacity:.78;}
.pn.dead{opacity:.48;}
.pn.dead .pname::after{content:'†';font-size:.7em;margin-left:2px;opacity:.75;}
/* element colors */
.pn.fire{--ec:#f97316;--er:249,115,22;}
.pn.water{--ec:#4db8ff;--er:77,184,255;}
.pn.earth{--ec:#6abf69;--er:106,191,105;}
.pn.air{--ec:#f5c518;--er:245,197,24;}
.pn.spirit{--ec:#9b7fe8;--er:155,127,232;}
.pn.none{--ec:rgba(107,138,171,.6);--er:107,138,171;}

.pn-top{display:flex;align-items:center;gap:4px;margin-bottom:1px;}
.pn-dot{width:5px;height:5px;border-radius:50%;background:var(--ec,var(--gold));flex-shrink:0;}
.pname{font-family:'Cinzel',serif;font-weight:700;font-size:.46rem;letter-spacing:.04em;
  color:var(--white);line-height:1.25;}
.prole{font-family:'Philosopher',serif;font-style:italic;font-size:.55rem;color:var(--muted);
  line-height:1.25;margin-bottom:1px;}
.pdates{font-family:'Cinzel',serif;font-size:.34rem;letter-spacing:.06em;color:rgba(107,138,171,.65);}

/* ── Bridge SVG lines ── */
.bridge{stroke:rgba(201,168,76,.22);stroke-width:1.5;fill:none;stroke-dasharray:5 4;}

/* ── Search bar ── */
#searchWrap{position:fixed;top:12px;right:14px;z-index:60;display:flex;align-items:center;gap:6px;pointer-events:all;position:fixed;}
#searchInner{position:relative;display:flex;align-items:center;}
#searchBox{font-family:'Cinzel',serif;font-size:.34rem;letter-spacing:.1em;
  background:rgba(6,10,20,.88);border:1px solid rgba(201,168,76,.25);border-radius:20px;
  padding:.42em 1em .42em 2em;color:var(--white);width:180px;outline:none;
  backdrop-filter:blur(16px);transition:border-color .2s,width .2s,box-shadow .2s;}
#searchBox:focus{border-color:rgba(201,168,76,.6);width:230px;box-shadow:0 0 18px rgba(201,168,76,.12);}
#searchBox::placeholder{color:rgba(107,138,171,.5);}
#searchIcon{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:rgba(201,168,76,.5);font-size:.65rem;line-height:1;}
#searchCount{font-family:'Cinzel',serif;font-size:.28rem;letter-spacing:.12em;
  color:rgba(201,168,76,.55);white-space:nowrap;min-width:36px;text-align:left;}
#searchClear{background:none;border:none;color:rgba(107,138,171,.5);cursor:pointer;
  font-size:.8rem;padding:.15em .4em;transition:color .15s;display:none;line-height:1;}
#searchClear:hover{color:var(--white);}

/* ── Search highlight states ── */
body.searching .pn{opacity:.15;filter:saturate(0.2);transition:opacity .2s,filter .2s;}
body.searching .pn.search-match{opacity:1!important;filter:none!important;
  border-color:rgba(201,168,76,.85)!important;
  box-shadow:0 0 16px rgba(201,168,76,.4)!important;z-index:10;position:relative;}
body.searching .pn.search-match .pname{color:#f0dfa0;}

/* ── Tree glow border ── */
.tree-wrap{border-radius:12px;padding:10px 10px 8px;
  border:1px solid var(--tree-border,rgba(255,255,255,.05));
  box-shadow:0 0 22px var(--tree-glow,transparent);
  background:rgba(4,7,13,.3);
  transition:box-shadow .3s;}
.tree-wrap:hover{box-shadow:0 0 36px var(--tree-glow,transparent);}

/* ── Collapse toggle ── */
.collapse-btn{display:inline-flex;align-items:center;justify-content:center;
  width:13px;height:13px;border-radius:50%;
  border:1px solid var(--tc,var(--gold-dim));
  background:rgba(4,7,13,.95);cursor:pointer;
  position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);
  z-index:5;font-size:7px;color:var(--tc,var(--gold));
  line-height:1;user-select:none;
  transition:transform .22s,background .15s;}
.collapse-btn:hover{background:rgba(201,168,76,.18);}
.fn-collapsible{position:relative;}
.fn-collapsible.collapsed > .collapse-btn{transform:translateX(-50%) rotate(-90deg);}
.fn-collapsible.collapsed > .drop{display:none;}
.fn-collapsible.collapsed > .cr{display:none;}

/* ── Detail panel ── */
#panel{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(6,10,20,.97);border-top:1px solid rgba(201,168,76,.15);border-radius:16px 16px 0 0;
  padding:1rem 1.3rem 1.2rem;max-height:48vh;overflow-y:auto;backdrop-filter:blur(24px);
  box-shadow:0 -8px 40px rgba(0,0,0,.6);transform:translateY(100%);
  transition:transform .32s cubic-bezier(.22,1,.36,1);}
#panel.open{transform:translateY(0);}
.ph{width:32px;height:3px;border-radius:3px;background:rgba(255,255,255,.12);margin:0 auto .5rem;cursor:pointer;}
.pmeta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.3rem;}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pntag{font-family:'Cinzel',serif;font-weight:700;font-size:.4rem;letter-spacing:.16em;text-transform:uppercase;}
.pdatestag{font-family:'Cinzel',serif;font-size:.32rem;letter-spacing:.1em;color:var(--muted);}
.ptitle{font-family:'Philosopher',serif;font-weight:700;font-size:1rem;color:var(--white);line-height:1.35;margin-bottom:.3rem;}
.pdesc{font-family:'Philosopher',serif;font-style:italic;font-size:.85rem;color:rgba(172,188,208,.85);line-height:1.7;}
.pfamily{font-family:'Cinzel',serif;font-size:.28rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:.4rem;}
.pclose{position:absolute;top:.8rem;right:1rem;background:none;border:none;cursor:pointer;color:var(--muted);padding:.25em;transition:color .15s;}
.pclose:hover{color:var(--white);}
.pclose svg{width:16px;height:16px;fill:currentColor;}
</style>
</head>
<body>

<div class="bg-layer"></div>

<div class="header">
  <div>
    <div class="header-title">Family Trees</div>
    <div class="header-sub">Lineage &amp; Legacy · Drag · Scroll to zoom · Click any card</div>
  </div>
</div>

<!-- Search -->
<div id="searchWrap">
  <div id="searchInner">
    <span id="searchIcon">⌕</span>
    <input id="searchBox" type="text" placeholder="Search people…" autocomplete="off" spellcheck="false">
    <button id="searchClear" title="Clear">✕</button>
  </div>
  <span id="searchCount"></span>
</div>

<div class="legend">
  <span class="leg"><span class="leg-dot" style="background:#f97316"></span>Fire</span>
  <span class="leg"><span class="leg-dot" style="background:#4db8ff"></span>Water</span>
  <span class="leg"><span class="leg-dot" style="background:#6abf69"></span>Earth</span>
  <span class="leg"><span class="leg-dot" style="background:#f5c518"></span>Air</span>
  <span class="leg"><span class="leg-dot" style="background:#9b7fe8"></span>Spirit</span>
  <span class="leg"><span class="leg-dot" style="background:#6b8aab"></span>Non-bender</span>
  <span class="leg"><span class="leg-dot" style="background:rgba(107,138,171,.28);border:1px solid rgba(107,138,171,.35)"></span>Deceased †</span>
</div>

<div class="hud">
  <button class="zbtn" id="zIn">+</button>
  <button class="zbtn" id="zOut">−</button>
  <button class="zreset" id="zReset">Reset</button>
</div>

<div id="canvasOuter">
  <div id="canvasInner">
    <svg id="bridgeSvg"></svg>
    <!-- trees injected by JS -->
  </div>
</div>

<!-- Detail panel -->
<div id="panel">
  <div class="ph" id="ph"></div>
  <button class="pclose" id="pclose"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
  <div class="pmeta">
    <div class="pdot" id="pdot"></div>
    <span class="pntag" id="pntag"></span>
    <span class="pdatestag" id="pdatestag"></span>
  </div>
  <div class="ptitle"  id="ptitle"></div>
  <div class="pdesc"   id="pdesc"></div>
  <div class="pfamily" id="pfamily"></div>
</div>

<script>
/* ══ DATA ══ */
const EL = {fire:'#f97316',water:'#4db8ff',earth:'#6abf69',air:'#f5c518',spirit:'#9b7fe8',none:'#6b8aab'};
const PEOPLE = {};
let _pid = 0;
function p(name,title,el,born,died,desc,fam){
  const id='p'+(_pid++);
  PEOPLE[id]={name,title,el,born,died,desc,fam};
  return id;
}

/* ══ TREES ══
   Only pure family/bloodline trees. "link" nodes removed.
   Spouses shown inline. Children/grandchildren only.
═══════════════════════════════════════════════════════ */

const TREES = {

  /* ── Fire Nation Royal Line ── */
  fire:{
    label:'Fire Nation Royal Line',
    color:'rgba(249,115,22,0.3)',
    root:{
      pid:p('Fire Lord Sozin','Fire Lord · Architect of the Hundred Year War','fire','82 BG','20 AG',
        'The Fire Lord who weaponized Sozin\'s Comet to massacre the Air Nomads and launch the Hundred Year War. Sozin\'s childhood best friend was Avatar Roku — whom he ultimately betrayed, watching him suffocate in volcanic fumes when he could have saved him. He died at 102, having watched the world burn for decades.',
        'Fire Nation Royal Family'),
      spouse:p('Lady Sozin','Fire Lady','none','?','?','Sozin\'s wife and Fire Lady. Mother of Azulon.','Fire Nation Royal Family'),
      children:[{
        pid:p('Fire Lord Azulon','Fire Lord · Son of Sozin','fire','0 AG','95 AG',
          'Son of Sozin, Azulon ruled the Fire Nation for 75 years. Cold, authoritarian, obsessed with the dynasty\'s supremacy. He ordered the execution of his own grandson Zuko as punishment for Ozai\'s ambition. He was poisoned by Ursa before the order could be carried out.',
          'Fire Nation Royal Family'),
        spouse:p('Fire Lady Ilah','Fire Lady','none','?','?','Azulon\'s wife and mother of Iroh and Ozai. She raised two sons who became polar opposites.','Fire Nation Royal Family'),
        children:[
          {
            pid:p('General Iroh','Dragon of the West · Grand Lotus · Tea Master','fire','c. 45 AG',null,
              'The elder son of Azulon. Once the Fire Nation\'s most feared military commander. His son Lu Ten\'s death during the Siege of Ba Sing Se shattered him. He abandoned the campaign, traveled every nation, and became Zuko\'s true father figure and the moral heart of the series. Can generate and redirect lightning.',
              'Fire Nation Royal Family'),
            spouse:p("Iroh's Wife","Lu Ten's Mother · Unnamed in Canon",'none','?','?','Iroh\'s wife and Lu Ten\'s mother. She is never named or shown in any canon source — not the animated series, comics, or novels. She may have died before the events of the show; Iroh never speaks of her.','Fire Nation Royal Family'),
            children:[{
              pid:p('Lu Ten','Prince · Son of Iroh','fire','?','95 AG',
                'Iroh\'s only son. Died during the 600-day Siege of Ba Sing Se — a loss so shattering that Iroh abandoned the siege and turned away from the war forever.',
                'Fire Nation Royal Family')
            }]
          },
          {
            pid:p('Fire Lord Ozai','Fire Lord · Phoenix King','fire','?',null,
              'The younger son of Azulon and the principal antagonist of the series. Stripped Zuko of his birthright, scarred his face, and banished him. Declared himself Phoenix King and planned to use Sozin\'s Comet to burn the Earth Kingdom into submission. Defeated when Aang used energybending to strip his firebending entirely.',
              'Fire Nation Royal Family'),
            spouse:p('Ursa','Mother · Former Princess · Secret Identity','none','?',null,
              'Zuko and Azula\'s mother. A descendant of Avatar Roku\'s bloodline — the reason Ozai married her. She poisoned Fire Lord Azulon to prevent Zuko\'s execution, then fled under a magically altered identity. Found years later by Zuko living peacefully under the name Noriko.',
              'Fire Nation Royal Family'),
            children:[
              {
                pid:p('Fire Lord Zuko','Fire Lord · Hero · Prince of Fire','fire','83 AG',null,
                  'Banished at 13 when Ozai scarred his face for speaking out of turn. Spent three years hunting the Avatar, then chose redemption. Joined Team Avatar, helped Aang end the war, and became the first Fire Lord of the new era. One of the greatest redemption arcs in the series.',
                  'Fire Nation Royal Family'),
                spouse:p('Mai','Royal Consort · Knife Thrower','none','85 AG',null,
                  'Azula\'s childhood friend and Zuko\'s partner. A lethal non-bender who throws razor-precise senbon and knives. She defied Azula at the Boiling Rock to protect Zuko — an act that cost her freedom and defined her character.',
                  'Fire Nation Royal Family'),
                children:[{
                  pid:p('Fire Lord Izumi','Fire Lord · Zuko\'s Daughter','fire','?',null,
                    'Zuko\'s daughter and the current Fire Lord in Korra\'s era. Stoic, decisive, and deeply committed to keeping the Fire Nation out of unnecessary conflicts.',
                    'Fire Nation Royal Family'),
                  spouse:p('Izumi\'s Husband','Fire Nation · Unnamed in Canon','none','?',null,'Izumi\'s husband and the father of General Iroh II. His identity is never revealed in the series.','Fire Nation Royal Family'),
                  children:[{
                    pid:p('General Iroh II','United Forces General · Fire Lord\'s Son','fire','?',null,
                      'Izumi\'s son and a senior general of the United Forces. Named after his great-great-uncle Iroh. A key military figure during Kuvira\'s invasion of Republic City.',
                      'Fire Nation Royal Family')
                  }]
                }]
              },
              {
                pid:p('Princess Azula','Crown Princess · Prodigy · Blue Fire','fire','85 AG',null,
                  'Sozin\'s firebending prodigy grandchild. Generates blue fire and lightning from birth. Conquered Ba Sing Se in a single night. Suffered a mental breakdown in the finale when she was betrayed by Mai and Ty Lee and defeated by Zuko and Katara. Last seen in a mental health facility.',
                  'Fire Nation Royal Family')
              }
            ]
          }
        ]
      }]
    }
  },

  /* ── Avatar Cycle ── */
  aang:{
    label:'The Avatar Cycle',
    color:'rgba(155,127,232,0.3)',
    root:{
      pid:p('Avatar Wan','First Avatar · The Bridge','spirit','c. 9,829 BG','c. 9,759 BG',
        'The very first Avatar — a young thief who stole fire from a lion turtle and was exiled to a spirit wilds. He befriended Raava, the spirit of peace and light, and during Harmonic Convergence the two fused permanently, allowing Wan to imprison Vaatu and separate the human and spirit worlds. He spent the rest of his long life trying to heal the fractured world, but died before he could see it finished. Every Avatar since carries Raava and is his reincarnation.',
        'The Avatar Cycle'),
      children:[{
        pid:p('Avatar Gun','Avatar · Era Unknown','none','?','?',
          'One of the few named Avatars from the vast unrecorded era between Wan and Szeto. Mentioned by name in the Yangchen novels. Nation, element, and deeds are unknown — Gun is a ghost in the historical record.',
          'The Avatar Cycle'),
        children:[{
          pid:p('Avatar Salai','Avatar · One of the Greatest','none','?','?',
            'Named in The Rise of Kyoshi as one of the greatest Avatars of all time. Nation of origin is unconfirmed — many theorize an Earth Kingdom Avatar. Their specific deeds are lost to history, surviving only in the reverence later Avatars held for their legacy.',
            'The Avatar Cycle'),
          children:[{
            pid:p('Avatar Szeto','Fire Nation Avatar · Grand Advisor · Bureaucrat','fire','?','?',
              'The Fire Nation Avatar directly preceding Yangchen. Born during catastrophic plagues, famine, and warring noble clans threatening to tear the Fire Nation apart. Rather than wield raw power, he chose patience — entering the government as a low-level minister and working up to Grand Advisor to Fire Lord Yosor. He ended coin debasement, brokered peace between the clans, and created the first famine relief programs. A revered figure; the Szeto Festival and school portraits honor him still. Also the first Avatar shown capable of lavabending.',
              'The Avatar Cycle'),
            children:[{
        pid:p('Avatar Yangchen','Air Nomad Avatar · Most Celebrated','air','?','?',
          'Widely considered one of the greatest Avatars ever. An Air Nomad of extraordinary power who believed the Avatar\'s duty to the world must override all personal spiritual peace. Made ruthless choices to protect the living world, leaving a complicated geopolitical legacy.',
          'The Avatar Cycle'),
        children:[{
        pid:p('Avatar Kuruk','Water Tribe Avatar · Broken by Grief','water','?','?',
          'A Northern Water Tribe waterbender who appeared carefree — but spent his entire life secretly fighting dark spirits in the Spirit World. The spirits destroyed everyone close to him. His wife Ummi was taken by the spirit Koh on their wedding day. He died young, drained by years of spiritual combat no one else knew about.',
          'The Avatar Cycle'),
        spouse:p('Ummi','Kuruk\'s Wife · Taken by Koh','none','?','?','Kuruk\'s wife, taken by the spirit Koh the Face Stealer on their wedding day. Her loss drove Kuruk into a secret lifelong battle against the spirit world\'s darkest forces.','The Avatar Cycle'),
        children:[{
          pid:p('Avatar Kyoshi','Earth Kingdom Avatar · Founder of Kyoshi Island','earth','c. 312 BG','82 BG',
            'The longest-lived Avatar — 230 years. Born in poverty; her Avatar status was initially stolen by a false claimant. She founded Kyoshi Island by splitting it from the mainland. Created the Kyoshi Warriors. She is known for ruthlessness in service of justice.',
            'The Avatar Cycle'),
          spouse:p('Rangi','Kyoshi\'s Beloved · Firebender Guard','fire','?','?','Kyoshi\'s partner and a skilled firebender who served as her personal guard. Fiercely protective of Kyoshi and the first person to truly believe in her.','The Avatar Cycle'),
          children:[{
            pid:p('Avatar Roku','Fire Nation Avatar · Sozin\'s Betrayed Friend','fire','c. 82 BG','12 BG',
              'Sozin\'s childhood best friend. A master of all four elements who failed at the crucial moment — he spared Sozin\'s life when he could have stopped the war. He died when Sozin abandoned him in a volcanic eruption. His bloodline through granddaughter Ursa flows into Zuko and Azula.',
              'The Avatar Cycle'),
            spouse:p('Ta Min','Roku\'s Wife','none','?','?','Avatar Roku\'s beloved wife. Her descendants include Ursa, making Zuko and Azula the Avatar\'s great-great-grandchildren.','The Avatar Cycle'),

/* ══ RENDER ENGINE ══ */
const EL_RGB = {fire:'249,115,22',water:'77,184,255',earth:'106,191,105',air:'245,197,24',spirit:'155,127,232',none:'107,138,171'};

function card(pid, isSpouse=false){
  const d = PEOPLE[pid];
  const ec = EL[d.el]||'#6b8aab';
  const dead = d.died ? 'dead' : '';
  const sp = isSpouse ? 'sp' : '';
  const dates = d.born ? (d.died ? `${d.born} – ${d.died}` : `${d.born} →`) : '';
  return `<div class="pn ${d.el||'none'} ${dead} ${sp}" data-pid="${pid}" style="--ec:${ec};--er:${EL_RGB[d.el]||'107,138,171'}">
    <div class="pn-top"><span class="pn-dot"></span><span class="pname">${d.name}</span></div>
    ${d.title?`<div class="prole">${d.title.split('·')[0].trim()}</div>`:''}
    ${dates?`<div class="pdates">${dates}</div>`:''}
  </div>`;
}

function renderNode(node, tc){
  const hasChildren = node.children && node.children.length > 0;
  const collapsible = hasChildren ? ' fn-collapsible' : '';
  let h = `<div class="fn${collapsible}">`;
  if(node.spouse){
    h += `<div class="couple">`;
    h += card(node.pid,false);
    h += `<div class="mx">×</div>`;
    h += card(node.spouse,true);
    h += `</div>`;
  } else {
    h += card(node.pid,false);
  }
  if(hasChildren){
    h += `<button class="collapse-btn" title="Collapse/expand" style="--tc:${tc}">▾</button>`;
    h += `<div class="drop"></div><div class="cr">`;
    for(const c of node.children){
      h += `<div class="cb">${renderNode(c,tc)}</div>`;
    }
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

/* ══ LAYOUT ══
   Condensed grid: trees placed in a tight 2-column layout
   with minimal gaps. Y positions computed after render.
══════════════════════════════════════════════════════ */
const LAYOUT = [
  // Col 0 (left), Col 1 (right)
  [{key:'fire'},{key:'aang'}],
  [{key:'water'},{key:'korra'}],
  [{key:'northern'},{key:'beifong'}],
  [{key:'earth'},{key:'mako'}],
  [{key:'ursa'},{key:'sato'}],
  [{key:'adversaries'}],
];

const COL_GAP = 20;  // gap between columns
const PAD = 20;      // outer padding
const ROW_GAP = 20;  // gap between rows

const inner = document.getElementById('canvasInner');
const bsvg  = document.getElementById('bridgeSvg');

const treeEls = {};

// Render trees
Object.entries(TREES).forEach(([key, tree]) => {
  const wrap = document.createElement('div');
  wrap.className = 'tree-wrap';
  wrap.id = 'tree-' + key;
  const glow = TREE_GLOWS[key] || {border:'rgba(255,255,255,.05)',glow:'transparent'};
  wrap.style.cssText = `position:absolute;left:0;top:0;--tree-border:${glow.border};--tree-glow:${glow.glow};`;
  const tc = tree.color;
  wrap.innerHTML = `
    <div class="tree-title" style="color:${tc.replace(/[\d.]+\)$/,'0.65)')};">${tree.label}</div>
    <div class="ftree" style="--tc:${tc}">${renderNode(tree.root, tc)}</div>`;
  inner.appendChild(wrap);
  treeEls[key] = wrap;
});

// After render, position trees using actual rendered widths
requestAnimationFrame(() => {
  let currentY = PAD;
  let maxRight = 0;

  LAYOUT.forEach(row => {
    let rowH = 0;
    let currentX = PAD;
    row.forEach((col) => {
      const el = treeEls[col.key];
      if(!el) return;
      el.style.left = currentX + 'px';
      el.style.top  = currentY + 'px';
      const w = el.offsetWidth;
      const h = el.offsetHeight;
      currentX += w + COL_GAP;
      maxRight = Math.max(maxRight, currentX);
      rowH = Math.max(rowH, h);
    });
    currentY += rowH + ROW_GAP;
  });

  bsvg.style.width  = maxRight + PAD + 'px';
  bsvg.style.height = currentY + 'px';

  resetView();
  setTimeout(drawBridges, 350);
});

/* ══ BRIDGES — connect shared people across trees ══ */
// [nameA, treeA, nameB, treeB, label]
const BRIDGES = [
  ['Master Katara (SWT)', 'water', 'Master Katara', 'aang', 'same person'],
  ['Avatar Korra (fam)',  'korra', 'Avatar Korra',  'aang', 'same person'],
  ['Asami Sato (own)',    'sato',  'Asami Sato',    'aang', 'same person'],
  ['Bolin (MB)',          'mako',  'Bolin',         'beifong', 'same person'],
  ['Avatar Roku (Ursa line)', 'ursa', 'Avatar Roku', 'aang', 'same person'],
];

function cardCenter(name, treeKey) {
  const el = treeEls[treeKey];
  if(!el) return null;
  const ir = inner.getBoundingClientRect();
  for(const c of el.querySelectorAll('.pn')){
    const pid = c.dataset.pid;
    if(PEOPLE[pid] && PEOPLE[pid].name === name){
      const cr = c.getBoundingClientRect();
      return {
        x: (cr.left - ir.left) / currentScale + c.offsetWidth/(2),
        y: (cr.top  - ir.top)  / currentScale + c.offsetHeight/(2)
      };
    }
  }
  return null;
}

function drawBridges(){
  bsvg.innerHTML = '';
  BRIDGES.forEach(([nA, kA, nB, kB]) => {
    const a = cardCenter(nA, kA);
    const b = cardCenter(nB, kB);
    if(!a||!b) return;
    const mx = (a.x+b.x)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('class','bridge');
    path.setAttribute('d',`M${a.x},${a.y} C${mx},${a.y} ${mx},${b.y} ${b.x},${b.y}`);
    bsvg.appendChild(path);
  });
}

/* ══ SEARCH ══ */
const searchBox   = document.getElementById('searchBox');
const searchCount = document.getElementById('searchCount');
const searchClear = document.getElementById('searchClear');

function doSearch(q) {
  const all = inner.querySelectorAll('.pn');
  if (!q) {
    document.body.classList.remove('searching');
    all.forEach(c => c.classList.remove('search-match'));
    searchCount.textContent = '';
    searchClear.style.display = 'none';
    return;
  }
  document.body.classList.add('searching');
  searchClear.style.display = 'inline';
  const ql = q.toLowerCase();
  let matches = [];
  all.forEach(c => {
    const pid = c.dataset.pid;
    const d = PEOPLE[pid];
    const hit = d && (d.name.toLowerCase().includes(ql) || (d.title||'').toLowerCase().includes(ql));
    c.classList.toggle('search-match', !!hit);
    if (hit) matches.push(c);
  });
  searchCount.textContent = matches.length ? `${matches.length} found` : 'no match';

  // Pan to first match
  if (matches.length > 0) {
    const c = matches[0];
    const ir = inner.getBoundingClientRect();
    const cr = c.getBoundingClientRect();
    // Node center in canvas space
    const nx = (cr.left - ir.left) / currentScale + c.offsetWidth / 2;
    const ny = (cr.top  - ir.top)  / currentScale + c.offsetHeight / 2;
    // Pan so node lands at screen center
    tx = window.innerWidth  / 2 - nx * currentScale;
    ty = window.innerHeight / 2 - ny * currentScale;
    applyT(true);
    setTimeout(drawBridges, 300);
  }
}

let searchTimer;
searchBox.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(searchBox.value.trim()), 160);
});
searchBox.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchBox.value=''; doSearch(''); searchBox.blur(); }
});
searchClear.addEventListener('click', () => { searchBox.value=''; doSearch(''); });

/* ══ COLLAPSE / EXPAND ══ */
inner.addEventListener('click', e => {
  const btn = e.target.closest('.collapse-btn');
  if (!btn) return;
  e.stopPropagation();
  const fn = btn.closest('.fn-collapsible');
  if (!fn) return;
  fn.classList.toggle('collapsed');
  setTimeout(() => { drawBridges(); }, 50);
});
const panel = document.getElementById('panel');
function openPanel(pid){
  const d = PEOPLE[pid]; if(!d) return;
  const ec = EL[d.el]||'#6b8aab';
  document.getElementById('pdot').style.background = ec;
  document.getElementById('pntag').textContent = d.name;
  document.getElementById('pntag').style.color  = ec;
  document.getElementById('pdatestag').textContent = d.born ? (d.died ? `${d.born} – ${d.died}` : `b. ${d.born}`) : '';
  document.getElementById('ptitle').textContent  = d.title||'';
  document.getElementById('pdesc').textContent   = d.desc||'';
  document.getElementById('pfamily').textContent = d.fam||'';
  panel.classList.add('open');
}
document.getElementById('pclose').onclick = () => panel.classList.remove('open');
document.getElementById('ph').onclick     = () => panel.classList.remove('open');

/* ══ PAN + ZOOM ══ */
const outer = document.getElementById('canvasOuter');
let tx=0, ty=0, currentScale=0.62;
const MIN_SC=0.28, MAX_SC=2.2;

function applyT(anim){
  inner.style.transition = anim ? 'transform .28s cubic-bezier(.22,1,.36,1)' : 'none';
  inner.style.transform  = `translate(${tx}px,${ty}px) scale(${currentScale})`;
}
function zoom(f,cx,cy){
  const ns = Math.min(MAX_SC, Math.max(MIN_SC, currentScale*f));
  const r  = ns/currentScale;
  tx = cx - r*(cx-tx); ty = cy - r*(cy-ty);
  currentScale = ns; applyT(false);
}
function resetView(){
  currentScale = 0.55;
  tx = window.innerWidth * 0.04;
  ty = window.innerHeight * 0.1;
  applyT(true);
}

// Mouse drag
let drag=false, didDrag=false, dX=0, dY=0;
outer.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  if(e.target.closest('#searchWrap')) return;
  drag=true; didDrag=false; dX=e.clientX-tx; dY=e.clientY-ty;
  outer.classList.add('drag');
});
window.addEventListener('mousemove', e=>{
  if(!drag) return;
  const nx=e.clientX-dX, ny=e.clientY-dY;
  if(Math.abs(nx-tx)>3||Math.abs(ny-ty)>3) didDrag=true;
  tx=nx; ty=ny; applyT(false);
});
window.addEventListener('mouseup', e=>{
  drag=false; outer.classList.remove('drag');
  if(!didDrag){
    if(e.target.closest('.collapse-btn')) return;
    if(e.target.closest('#searchWrap')) return;
    const pn=e.target.closest('.pn');
    if(pn) openPanel(pn.dataset.pid);
    else if(!e.target.closest('#panel')&&!e.target.closest('.hud')) panel.classList.remove('open');
  }
});

// Touch
let tX=0,tY=0,tTx=0,tTy=0,tDrag=false,pinch=0;
outer.addEventListener('touchstart', e=>{
  if(e.touches.length===1){tX=e.touches[0].clientX;tY=e.touches[0].clientY;tTx=tx;tTy=ty;tDrag=false;}
  if(e.touches.length===2) pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
outer.addEventListener('touchmove', e=>{
  if(e.touches.length===1){
    const dx=e.touches[0].clientX-tX,dy=e.touches[0].clientY-tY;
    if(Math.abs(dx)>4||Math.abs(dy)>4) tDrag=true;
    tx=tTx+dx; ty=tTy+dy; applyT(false);
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2, cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    zoom(d/(pinch||d),cx,cy); pinch=d;
  }
},{passive:true});
outer.addEventListener('touchend', e=>{
  if(!tDrag&&e.changedTouches.length===1){
    const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    const pn=el?.closest('.pn'); if(pn) openPanel(pn.dataset.pid);
  }
},{passive:true});

// Scroll zoom
outer.addEventListener('wheel', e=>{e.preventDefault(); zoom(e.deltaY<0?1.1:0.91, e.clientX, e.clientY);},{passive:false});

document.getElementById('zIn').onclick    = () => zoom(1.22, window.innerWidth/2, window.innerHeight/2);
document.getElementById('zOut').onclick   = () => zoom(0.82, window.innerWidth/2, window.innerHeight/2);
document.getElementById('zReset').onclick = () => { resetView(); setTimeout(drawBridges, 350); };

window.addEventListener('resize', drawBridges);
</script>
</body>
