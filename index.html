<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legend Of Aang</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Cinzel+Decorative:wght@400;700;900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design tokens ─── */
    :root {
      --deep:   #04070d;
      --panel:  #0a111c;
      --blue:   #4db8ff;
      --white:  #f0f4ff;
      --muted:  #6b8aab;
      --dim:    #2d3f56;
      --border: rgba(255, 255, 255, 0.06);
      --gold:   #c9a84c;
      --air:    #f5c518;
      --water:  #4db8ff;
      --earth:  #6abf69;
      --fire:   #f97316;

      /* GitHub raw base — swap branch if needed */
      --gh: "https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main";
    }

    /* ─── Keyframes ─── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes overlayFadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }

    /* Element glow pulses */
    @keyframes pulseGlowAir   { 0%,100%{filter:drop-shadow(0 0 5px #f5c518)} 50%{filter:drop-shadow(0 0 18px #f5c518)} }
    @keyframes pulseGlowWater { 0%,100%{filter:drop-shadow(0 0 5px #4db8ff)} 50%{filter:drop-shadow(0 0 18px #4db8ff)} }
    @keyframes pulseGlowEarth { 0%,100%{filter:drop-shadow(0 0 5px #6abf69)} 50%{filter:drop-shadow(0 0 18px #6abf69)} }
    @keyframes pulseGlowFire  { 0%,100%{filter:drop-shadow(0 0 5px #f97316)} 50%{filter:drop-shadow(0 0 18px #f97316)} }
    @keyframes cornerGlowAir   { 0%,100%{filter:drop-shadow(0 0 3px #f5c518)} 50%{filter:drop-shadow(0 0 10px #f5c518)} }
    @keyframes cornerGlowWater { 0%,100%{filter:drop-shadow(0 0 3px #4db8ff)} 50%{filter:drop-shadow(0 0 10px #4db8ff)} }
    @keyframes cornerGlowEarth { 0%,100%{filter:drop-shadow(0 0 3px #6abf69)} 50%{filter:drop-shadow(0 0 10px #6abf69)} }
    @keyframes cornerGlowFire  { 0%,100%{filter:drop-shadow(0 0 3px #f97316)} 50%{filter:drop-shadow(0 0 10px #f97316)} }

    /* ─── Page-ready animations (fire only once overlay is gone) ─── */
    .anim-header, .anim-title, .anim-sub, .anim-player { opacity: 0; }
    body.page-ready .anim-header { animation: slideUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both; }
    body.page-ready .anim-title  { animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    body.page-ready .anim-sub    { animation: slideUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.30s both; }
    body.page-ready .anim-player { animation: slideUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.42s both; }

    /* ─── Base ─── */
    body {
      background: var(--deep);
      color: var(--white);
      font-family: 'Philosopher', Georgia, serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Background ─── */
    .bg-layer {
      position: fixed; inset: 0;
      background-image: url('https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/background.png');
      background-size: cover;
      background-position: center top;
      filter: blur(8px) brightness(0.22) saturate(1.4);
      transform: scale(1.04);
      z-index: 0;
    }
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,7,13,0.55) 0%, transparent 35%,
        transparent 65%, rgba(4,7,13,0.7) 100%
      );
    }

    /* ─── Intro overlay ─── */
    #introOverlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(4,7,13,0.72);
      backdrop-filter: blur(2px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3rem;
    }
    #introOverlay.fade-out {
      animation: overlayFadeOut 0.65s ease forwards;
      pointer-events: none;
    }

    .intro-tagline {
      font-family: 'Philosopher', serif;
      font-size: clamp(0.6rem, 1.6vw, 0.8rem);
      font-style: italic;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(200, 180, 120, 0.55);
      opacity: 0;
      transition: opacity 0.6s ease 0.15s;
    }
    #introOverlay.symbols-in .intro-tagline { opacity: 1; }

    .symbols-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(2rem, 5vw, 5rem);
      align-items: center;
      justify-items: center;
    }
    @media (max-width: 600px) {
      .symbols-grid { grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    }

    .sym-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 0.9rem;
      opacity: 0; transform: scale(0.78);
      transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    #introOverlay.symbols-in .sym-item { opacity: 1; transform: scale(1); }

    .sym-img { width: clamp(64px, 8vw, 100px); height: clamp(64px, 8vw, 100px); object-fit: contain; }
    .sym-item.air   .sym-img { animation: pulseGlowAir   2.6s ease-in-out infinite 0.0s; }
    .sym-item.water .sym-img { animation: pulseGlowWater 2.6s ease-in-out infinite 0.4s; }
    .sym-item.earth .sym-img { animation: pulseGlowEarth 2.6s ease-in-out infinite 0.8s; }
    .sym-item.fire  .sym-img { animation: pulseGlowFire  2.6s ease-in-out infinite 1.2s; }

    .sym-label {
      font-family: 'Philosopher', serif;
      font-size: clamp(0.55rem, 1.3vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    .sym-item.air   .sym-label { color: var(--air);   }
    .sym-item.water .sym-label { color: var(--water); }
    .sym-item.earth .sym-label { color: var(--earth); }
    .sym-item.fire  .sym-label { color: var(--fire);  }

    /* ─── Page layout ─── */
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      padding: 2rem 4rem;
      display: flex; align-items: center; justify-content: flex-end; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-tag {
      font-family: 'Cinzel', serif; font-size: 0.55rem;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--muted); border: 1px solid var(--dim);
      padding: 0.4em 1.2em; border-radius: 30px;
    }

    /* ─── Hero ─── */
    .hero { text-align: center; padding: 6rem 2rem 4rem; }
    .hero-main {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      font-size: clamp(3rem, 7vw, 5.5rem);
      letter-spacing: 0.1em; text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #b3d4ff 50%, #4db8ff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.5rem;
    }
    .hero-sub {
      font-family: 'Philosopher', serif; font-weight: 400; font-style: italic;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      color: var(--muted); letter-spacing: 0.25em; margin-bottom: 2rem;
    }

    /* ─── Player section ─── */
    .player-section {
      width: 100%; max-width: 1400px; margin: 0 auto;
      padding: 0 clamp(1.5rem, 5vw, 4rem);
    }

    /* Engraved gold frame — border thickened to 5px */
    .player-frame {
      position: relative;
      padding: 5px;
      border-radius: 20px;
      background: linear-gradient(
        135deg,
        rgba(201,168,76,0.75)  0%,
        rgba(120,95,40,0.35)   25%,
        rgba(255,210,100,0.55) 50%,
        rgba(120,95,40,0.30)   75%,
        rgba(201,168,76,0.70) 100%
      );
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.18),
        0 0 40px rgba(201,168,76,0.13),
        0 0 80px rgba(201,168,76,0.06),
        inset 0 1px 0 rgba(255,240,180,0.18);
    }

    /* ─── Corner ornaments ─── */
    .corner {
      position: absolute; z-index: 30;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,7,13,0.85);
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(201,168,76,0.3);
    }
    .corner-img { width: 26px; height: 26px; object-fit: contain; opacity: 0.85; }
    .corner-tl { top: -20px; left: -20px; }
    .corner-tr { top: -20px; right: -20px; }
    .corner-bl { bottom: -20px; left: -20px; }
    .corner-br { bottom: -20px; right: -20px; }
    .corner-air   { animation: cornerGlowAir   2.6s ease-in-out infinite 0.0s; }
    .corner-water { animation: cornerGlowWater 2.6s ease-in-out infinite 0.4s; }
    .corner-earth { animation: cornerGlowEarth 2.6s ease-in-out infinite 0.8s; }
    .corner-fire  { animation: cornerGlowFire  2.6s ease-in-out infinite 1.2s; }

    /* ─── Player shell ─── */
    .player-shell {
      position: relative; background: #000;
      border-radius: 16px; overflow: hidden;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.7), inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .player-shell.idle { cursor: none; }
    .player-shell.idle .controls { opacity: 0; pointer-events: none; transform: translateY(10px); }

    #mainVideo {
      display: block; width: 100%;
      aspect-ratio: 239 / 100;
      background: #000; pointer-events: none; object-fit: cover;
    }

    /* ─── Big play button ─── */
    .big-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      z-index: 10; pointer-events: none; transition: all 0.4s ease;
    }
    .big-play svg { width: 28px; height: 28px; fill: var(--white); margin-left: 4px; }
    .big-play.hidden { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }

    .click-area { position: absolute; inset: 0; z-index: 11; cursor: pointer; }

    /* ─── Controls bar ─── */
    .controls {
      position: absolute; bottom: 24px; left: 24px; right: 24px; z-index: 20;
      background: rgba(10,15,25,0.65); backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
      padding: 14px 24px; transition: all 0.4s ease;
    }
    .progress {
      position: relative; height: 18px;
      display: flex; align-items: center;
      margin-bottom: 10px; cursor: pointer;
    }
    .progress-track {
      position: absolute; left: 0; right: 0; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 4px;
    }
    .prog-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--blue); border-radius: 4px; width: 0%; }
    .prog-thumb {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 12px; height: 12px; border-radius: 50%; background: var(--white);
      left: 0%; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .progress:hover .prog-thumb { opacity: 1; }

    .ctrls-row { display: flex; align-items: center; gap: 10px; }
    .cbtn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.6);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .cbtn:hover { color: var(--white); }
    .cbtn svg { width: 20px; height: 20px; }

    .vol-wrap { display: flex; align-items: center; gap: 6px; }
    .vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px; border-radius: 4px; cursor: pointer;
      background: linear-gradient(to right, var(--blue) 100%, rgba(255,255,255,0.15) 100%);
      outline: none; border: none;
    }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--white); cursor: pointer; }
    .vol-slider::-moz-range-thumb    { width: 12px; height: 12px; border-radius: 50%; background: var(--white); cursor: pointer; border: none; }

    .time-disp { font-family: 'Cinzel', serif; font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-left: 8px; }
    .time-disp b { color: var(--white); }
    .flex-grow { flex: 1; }

    /* ─── Fullscreen ─── */
    :fullscreen .player-shell,
    :-webkit-full-screen .player-shell {
      width: 100vw; height: 100vh; border-radius: 0;
      display: flex; flex-direction: column; justify-content: center; background: #000;
    }
    :fullscreen #mainVideo,
    :-webkit-full-screen #mainVideo {
      width: 100vw; height: 100vh; max-width: 100%; max-height: 100%;
      aspect-ratio: unset; object-fit: contain;
    }
    :fullscreen .controls,
    :-webkit-full-screen .controls { bottom: 28px; left: 28px; right: 28px; }

    footer { padding: 4rem 2rem 3rem; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      header { padding: 1.5rem 2rem; }
      .controls { bottom: 12px; left: 12px; right: 12px; }
    }

    /* ─── Jeffrey Creates watermark ─── */
    .jeffrey-watermark {
      position: fixed; bottom: 14px; right: 18px; z-index: 50;
      display: inline-flex; align-items: center; gap: 5px;
      text-decoration: none; font-family: 'Cinzel', serif;
      font-size: 0.42rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(107,138,171,0.45);
      transition: color 0.2s ease, opacity 0.2s ease;
      opacity: 0.6;
    }
    .jeffrey-watermark:hover { color: rgba(240,244,255,0.7); opacity: 1; }
  </style>
</head>
<body>

<!-- ── Intro overlay ── -->
<div id="introOverlay" style="cursor:pointer;" title="Click to enter">
  <p class="intro-tagline">Four elements. One destiny.</p>
  <div class="symbols-grid">
    <div class="sym-item water">
      <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/water.png" alt="Water symbol" class="sym-img">
      <span class="sym-label">Water</span>
    </div>
    <div class="sym-item earth">
      <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/earth.png" alt="Earth symbol" class="sym-img">
      <span class="sym-label">Earth</span>
    </div>
    <div class="sym-item fire">
      <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/fire.png" alt="Fire symbol" class="sym-img">
      <span class="sym-label">Fire</span>
    </div>
    <div class="sym-item air">
      <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/air.png" alt="Air symbol" class="sym-img">
      <span class="sym-label">Air</span>
    </div>
  </div>

</div>

<!-- ── Background ── -->
<div class="bg-layer"></div>

<div class="page">
  <header class="anim-header">
    <div class="header-tag">Exclusive Screening</div>
  </header>

  <section class="hero">
    <h1 class="hero-main anim-title">Legend of Aang</h1>
    <p class="hero-sub anim-sub">The Last Airbender</p>
  </section>

  <section class="player-section anim-player">
    <div class="player-frame">

      <!-- Corner ornaments: Water TL · Earth TR · Fire BL · Air BR -->
      <div class="corner corner-tl">
        <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/water.png" alt="Water" class="corner-img corner-water">
      </div>
      <div class="corner corner-tr">
        <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/earth.png" alt="Earth" class="corner-img corner-earth">
      </div>
      <div class="corner corner-bl">
        <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/fire.png" alt="Fire" class="corner-img corner-fire">
      </div>
      <div class="corner corner-br">
        <img src="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/air.png" alt="Air" class="corner-img corner-air">
      </div>

      <div class="player-shell idle" id="playerShell">
        <video id="mainVideo" preload="metadata" playsinline
               poster="https://raw.githubusercontent.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/main/preview.jpg">
          <source src="https://github.com/JeffreyHamilton6399/Legend-of-Aang-The-Last-Airbender/releases/download/V1.0/aang.mp4" type="video/mp4">
        </video>

        <div class="big-play" id="bigPlay">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <div class="click-area" id="clickArea"></div>

        <div class="controls" id="controls">
          <div class="progress" id="prog">
            <div class="progress-track">
              <div class="prog-fill" id="progFill"></div>
            </div>
            <div class="prog-thumb" id="progThumb"></div>
          </div>
          <div class="ctrls-row">
            <button class="cbtn" id="playBtn" aria-label="Play / Pause">
              <svg id="icPlay"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              <svg id="icPause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="time-disp"><b id="curTime">0:00</b> / <span id="durTime">0:00</span></div>
            <div class="flex-grow"></div>
            <div class="vol-wrap">
              <button class="cbtn" id="volBtn" aria-label="Toggle mute">
                <svg id="icVolOn"  viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <svg id="icVolOff" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
              </button>
              <input type="range" id="volSlider" class="vol-slider" min="0" max="1" step="0.02" value="1" aria-label="Volume">
            </div>
            <button class="cbtn" id="fsBtn" aria-label="Toggle fullscreen">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </section>

  <footer></footer>
</div>

<!-- ── Jeffrey Creates watermark ── -->
<a class="jeffrey-watermark" href="https://www.youtube.com/@Jeffrey_Creates" target="_blank" rel="noopener">
  <svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:#ff1c1c;flex-shrink:0"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
  Jeffrey Creates
</a>

<script>
/* ══════════════════════════════════════════════
   Intro audio — Web Audio API unlock for instant
   playback on first gesture; no perceptible delay.
══════════════════════════════════════════════ */
const sfx = new Audio('intro.mp3');
sfx.preload = 'auto';
sfx.volume  = 1.0;

// Pre-fetch + decode into AudioContext so buffer is warm
// and plays with zero latency on the first user gesture.
let _actx = null;
let _sfxBuf = null;
let audioStarted = false;

(function warmAudio() {
  try {
    _actx = new (window.AudioContext || window.webkitAudioContext)();
    fetch('intro.mp3')
      .then(r => r.arrayBuffer())
      .then(ab => _actx.decodeAudioData(ab))
      .then(buf => { _sfxBuf = buf; })
      .catch(() => {});
  } catch(e) {}
})();

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  // If buffer is decoded, play via Web Audio (instant, no buffering delay)
  if (_actx && _sfxBuf) {
    _actx.resume().then(() => {
      const src = _actx.createBufferSource();
      src.buffer = _sfxBuf;
      src.connect(_actx.destination);
      src.start(0);
    });
  } else {
    // Fallback to HTMLAudio
    sfx.play().catch(() => {});
  }
}

// Try right away (works if browser permits autoplay)
startAudio();

// Fallback: fire on first real interaction if blocked
['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt =>
  document.addEventListener(evt, startAudio, { once: true, capture: true })
);

function stopIntroAudio() {
  // Fade & close Web Audio context if it was used
  if (_actx && _actx.state === 'running') {
    try {
      const gain = _actx.createGain();
      gain.gain.setValueAtTime(1, _actx.currentTime);
      gain.gain.linearRampToValueAtTime(0, _actx.currentTime + 0.4);
      setTimeout(() => { try { _actx.close(); } catch(e) {} }, 450);
    } catch(e) {}
  }
  // Also fade HTMLAudio fallback (no-op if not playing)
  const fadeStep = 0.05;
  const fade = setInterval(() => {
    if (sfx.volume > fadeStep) {
      sfx.volume -= fadeStep;
    } else {
      sfx.pause();
      sfx.currentTime = 0;
      sfx.volume = 1.0;
      clearInterval(fade);
    }
  }, 40);
}

/* ══════════════════════════════════════════════
   Intro overlay sequence
══════════════════════════════════════════════ */
const overlay = document.getElementById('introOverlay');

requestAnimationFrame(() => {
  setTimeout(() => {
    overlay.classList.add('symbols-in');
  }, 80);
});

function dismissOverlay() {
  if (overlay.classList.contains('fade-out')) return;
  overlay.classList.add('fade-out');
  stopIntroAudio();
  setTimeout(() => {
    overlay.style.display = 'none';
    document.body.classList.add('page-ready');
  }, 650);
}

// Auto-dismiss after 2.4s
setTimeout(dismissOverlay, 2400);

// Also dismiss on click
overlay.addEventListener('click', dismissOverlay);

/* ══════════════════════════════════════════════
   Video player
══════════════════════════════════════════════ */
const vid       = document.getElementById('mainVideo');
const shell     = document.getElementById('playerShell');
const bigPlay   = document.getElementById('bigPlay');
const clickArea = document.getElementById('clickArea');
const playBtn   = document.getElementById('playBtn');
const icPlay    = document.getElementById('icPlay');
const icPause   = document.getElementById('icPause');
const curEl     = document.getElementById('curTime');
const durEl     = document.getElementById('durTime');
const progFill  = document.getElementById('progFill');
const progThumb = document.getElementById('progThumb');
const prog      = document.getElementById('prog');
const volBtn    = document.getElementById('volBtn');
const volSlider = document.getElementById('volSlider');
const icVolOn   = document.getElementById('icVolOn');
const icVolOff  = document.getElementById('icVolOff');

/* ── Idle cursor hiding ── */
let idleTimer;
function resetIdle() {
  shell.classList.remove('idle');
  clearTimeout(idleTimer);
  if (!vid.paused) idleTimer = setTimeout(() => shell.classList.add('idle'), 1250);
}
document.addEventListener('mousemove', resetIdle);
document.addEventListener('keydown',   resetIdle);

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.code) {
    case 'Space':
    case 'KeyK':
      e.preventDefault(); togglePlay(); break;
    case 'ArrowRight':
      e.preventDefault();
      if (isFinite(vid.duration)) vid.currentTime = Math.min(vid.duration, vid.currentTime + 5);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      vid.currentTime = Math.max(0, vid.currentTime - 5);
      break;
    case 'ArrowUp':
      e.preventDefault();
      vid.volume = Math.min(1, vid.volume + 0.1);
      vid.muted = false;
      volSlider.value = vid.volume;
      updateVolUI();
      break;
    case 'ArrowDown':
      e.preventDefault();
      vid.volume = Math.max(0, vid.volume - 0.1);
      vid.muted = vid.volume === 0;
      volSlider.value = vid.volume;
      updateVolUI();
      break;
    case 'KeyM':
      vid.muted = !vid.muted;
      volSlider.value = vid.muted ? 0 : (vid.volume || 1);
      updateVolUI();
      break;
    case 'KeyF':
      e.preventDefault();
      toggleFullscreen();
      break;
  }
});

/* ── Touch: single tap shows controls, double tap toggles play ── */
let tapTimer = null;
clickArea.addEventListener('touchend', e => {
  e.preventDefault();
  resetIdle();
  if (tapTimer) {
    clearTimeout(tapTimer);
    tapTimer = null;
    togglePlay();
  } else {
    tapTimer = setTimeout(() => { tapTimer = null; }, 300);
  }
}, { passive: false });

/* ── Helpers ── */
function fmt(s) {
  s = Math.floor(s || 0);
  const h  = Math.floor(s / 3600);
  const m  = Math.floor((s % 3600) / 60);
  const sc = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2, '0')}:${String(sc).padStart(2, '0')}`
    : `${m}:${String(sc).padStart(2, '0')}`;
}

function togglePlay() {
  vid.paused ? vid.play() : vid.pause();
}

function toggleFullscreen() {
  document.fullscreenElement
    ? document.exitFullscreen()
    : shell.requestFullscreen().catch(() => {});
}

/* ── Play / pause state ── */
clickArea.addEventListener('click', togglePlay);
playBtn.addEventListener('click', togglePlay);

vid.addEventListener('play', () => {
  icPlay.style.display  = 'none';
  icPause.style.display = '';
  bigPlay.classList.add('hidden');
  resetIdle();
});
vid.addEventListener('pause', () => {
  icPlay.style.display  = '';
  icPause.style.display = 'none';
  bigPlay.classList.remove('hidden');
  shell.classList.remove('idle');
});

/* ── Duration / time display ── */
vid.addEventListener('loadedmetadata', () => { durEl.textContent = fmt(vid.duration); });

vid.addEventListener('timeupdate', () => {
  if (isSeeking) return;
  const pct = (vid.currentTime / vid.duration) * 100 || 0;
  progFill.style.width  = pct + '%';
  progThumb.style.left  = pct + '%';
  curEl.textContent     = fmt(vid.currentTime);
});

/* ── Seek bar ── */
let isSeeking = false;

function seekTo(clientX) {
  const rect = prog.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const t    = pct * vid.duration;
  vid.currentTime       = t;
  progFill.style.width  = (pct * 100) + '%';
  progThumb.style.left  = (pct * 100) + '%';
  curEl.textContent     = fmt(t);
}

prog.addEventListener('mousedown', e => { isSeeking = true; seekTo(e.clientX); e.stopPropagation(); });
document.addEventListener('mousemove', e => { if (isSeeking) seekTo(e.clientX); });
document.addEventListener('mouseup',   () => { isSeeking = false; });

prog.addEventListener('touchstart',   e => { isSeeking = true; seekTo(e.touches[0].clientX); }, { passive: true });
document.addEventListener('touchmove', e => { if (isSeeking) seekTo(e.touches[0].clientX); }, { passive: true });
document.addEventListener('touchend',  () => { isSeeking = false; });

/* ── Volume ── */
function updateVolUI() {
  const muted = vid.muted || vid.volume === 0;
  icVolOn.style.display  = muted ? 'none' : '';
  icVolOff.style.display = muted ? '' : 'none';
  const pct = muted ? 0 : vid.volume * 100;
  volSlider.style.background =
    `linear-gradient(to right, var(--blue) ${pct}%, rgba(255,255,255,0.15) ${pct}%)`;
}

volSlider.addEventListener('input', () => {
  vid.volume = parseFloat(volSlider.value);
  vid.muted  = vid.volume === 0;
  updateVolUI();
});
volBtn.addEventListener('click', () => {
  vid.muted       = !vid.muted;
  volSlider.value = vid.muted ? 0 : (vid.volume || 1);
  updateVolUI();
});
vid.addEventListener('volumechange', updateVolUI);
updateVolUI();

/* ── Fullscreen button ── */
document.getElementById('fsBtn').addEventListener('click', toggleFullscreen);
</script>
</body>
</html>
